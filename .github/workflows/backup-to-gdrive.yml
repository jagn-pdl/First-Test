name: Backup to Google Drive

on:
  push:
    branches:
      - main

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install rclone
        uses: AnimMouse/setup-rclone@v1

      - name: Configure rclone
        env:
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
          GDRIVE_ROOT_FOLDER_ID: ${{ vars.GDRIVE_ROOT_FOLDER_ID }}
        run: |
          mkdir -p ~/.config/rclone
          printf '[gdrive]\ntype = drive\nscope = drive\ntoken = %s\nroot_folder_id = %s\n' \
            "$GDRIVE_TOKEN" "$GDRIVE_ROOT_FOLDER_ID" > ~/.config/rclone/rclone.conf

      - name: Copy repo to Google Drive
        run: |
          rclone copy . gdrive: \
            --exclude ".git/**" \
            --exclude ".github/**" \
            --filter "+ README.md" \
            --filter "- *.md" \
            --exclude "node_modules/**" \
            --exclude ".venv/**" \
            --exclude "venv/**" \
            --exclude "__pycache__/**" \
            --exclude "*.pyc" \
            --exclude "dist/**" \
            --exclude "build/**" \
            --exclude ".next/**" \
            --exclude "out/**" \
            --exclude "target/**" \
            --exclude ".gradle/**" \
            --exclude "vendor/**" \
            --exclude ".env" \
            --exclude ".env.local" \
            --exclude "coverage/**" \
            --exclude ".pytest_cache/**" \
            --exclude "*.log" \
            --drive-skip-gdocs \
            -v