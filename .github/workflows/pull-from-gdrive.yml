name: Pull from Google Drive

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Required only for full pull — type YES to confirm overwrite of repo contents (auto-skipped if ITERATE_FILES.txt exists)'
        required: false
        default: ''

jobs:
  pull:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install rclone
        uses: AnimMouse/setup-rclone@v1

      - name: Configure rclone
        env:
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
          GDRIVE_ROOT_FOLDER_ID: ${{ vars.GDRIVE_ROOT_FOLDER_ID }}
        run: |
          mkdir -p ~/.config/rclone
          printf '[gdrive]\ntype = drive\nscope = drive\ntoken = %s\nroot_folder_id = %s\n' \
            "$GDRIVE_TOKEN" "$GDRIVE_ROOT_FOLDER_ID" > ~/.config/rclone/rclone.conf

      - name: Check for ITERATE_FILES.txt and decide mode
        run: |
          rclone copyto "gdrive:${{ github.event.repository.name }}/ITERATE_FILES.txt" ./ITERATE_FILES.txt -v 2>/dev/null || true
          if [ -f ITERATE_FILES.txt ]; then
            echo "PULL_MODE=iterate" >> $GITHUB_ENV
            echo "✅ ITERATE_FILES.txt found — will pull changed files only."
            cat ITERATE_FILES.txt
          else
            echo "PULL_MODE=full" >> $GITHUB_ENV
            echo "ℹ️ ITERATE_FILES.txt not found — full pull mode."
          fi

      - name: Abort full pull if not confirmed
        if: env.PULL_MODE == 'full' && github.event.inputs.confirm != 'YES'
        run: |
          echo "❌ Full pull requires confirmation. Re-run this workflow and type YES in the confirm field."
          exit 1

      - name: Pull only changed files (ITERATE mode)
        if: env.PULL_MODE == 'iterate'
        run: |
          while IFS= read -r filepath || [ -n "$filepath" ]; do
            [[ -z "$filepath" || "$filepath" == \#* ]] && continue
            echo "Pulling: $filepath"
            dir=$(dirname "$filepath")
            mkdir -p "$dir"
            rclone copyto "gdrive:${{ github.event.repository.name }}/$filepath" "./$filepath" -v
          done < ITERATE_FILES.txt

      - name: Pull everything from Drive (full mode)
        if: env.PULL_MODE == 'full'
        run: |
          rclone sync gdrive:${{ github.event.repository.name }} . \
            --exclude ".git/**" \
            --exclude ".github/**" \
            --exclude "node_modules/**" \
            --exclude ".venv/**" \
            --exclude "venv/**" \
            --exclude "__pycache__/**" \
            --exclude "*.pyc" \
            --exclude "dist/**" \
            --exclude "build/**" \
            --exclude ".next/**" \
            --exclude "out/**" \
            --exclude "target/**" \
            --exclude ".gradle/**" \
            --exclude "vendor/**" \
            --exclude ".env" \
            --exclude ".env.local" \
            --exclude "coverage/**" \
            --exclude ".pytest_cache/**" \
            --exclude "*.log" \
            --filter "+ README.md" \
            --filter "- *.md" \
            --drive-skip-gdocs \
            -v

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Pull from Google Drive [skip ci]"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push origin main