name: Pull Changed Files from ITERATE

on:
  workflow_dispatch:

jobs:
  pull-iterate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install rclone
        uses: AnimMouse/setup-rclone@v1

      - name: Configure rclone
        env:
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
          GDRIVE_ROOT_FOLDER_ID: ${{ vars.GDRIVE_ROOT_FOLDER_ID }}
        run: |
          mkdir -p ~/.config/rclone
          printf '[gdrive]\ntype = drive\nscope = drive\ntoken = %s\nroot_folder_id = %s\n' \
            "$GDRIVE_TOKEN" "$GDRIVE_ROOT_FOLDER_ID" > ~/.config/rclone/rclone.conf

      - name: Read file manifest from Drive
        run: |
          rclone copy "gdrive:${{ github.event.repository.name }}/ITERATE_FILES.txt" . -v
          if [ ! -f ITERATE_FILES.txt ]; then
            echo "❌ ITERATE_FILES.txt not found in Drive."
            echo "Run an ITERATE session first — it writes this file automatically."
            exit 1
          fi
          echo "Files to pull:"
          cat ITERATE_FILES.txt

      - name: Pull only changed files
        run: |
          while IFS= read -r filepath || [ -n "$filepath" ]; do
            # Skip blank lines and comments
            [[ -z "$filepath" || "$filepath" == \#* ]] && continue
            echo "Pulling: $filepath"
            dir=$(dirname "$filepath")
            mkdir -p "$dir"
            rclone copy "gdrive:${{ github.event.repository.name }}/$filepath" "$dir/" -v
          done < ITERATE_FILES.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Apply ITERATE changes [skip ci]"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push origin main
